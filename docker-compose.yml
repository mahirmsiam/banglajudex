version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: banglajudex-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-banglajudex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banglajudex-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/banglajudex
      AD_JUDGMENTS_PATH: /data/ad_judgments
      SC_JUDGMENTS_PATH: /data/sc_judgments
      CHROMA_PERSIST_PATH: /data/chroma_data
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: mistral
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./ad_judgments:/data/ad_judgments:ro
      - ./sc_judgments:/data/sc_judgments:ro
      - chroma_data:/data/chroma_data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  # Ollama LLM
  ollama:
    image: ollama/ollama:latest
    container_name: banglajudex-llm
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Frontend (to be added)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banglajudex-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
